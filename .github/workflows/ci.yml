name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v6
        - name: Setup node
          uses: actions/setup-node@v6
          with:
            node-version: '20'
            cache: 'yarn'
        - name: Install dependencies
          run: yarn 
        - name: Run tests
          run: yarn run test