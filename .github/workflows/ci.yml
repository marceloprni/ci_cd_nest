name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
      - uses: actions/checkout@v6
      - name: Setup node | ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'
      - name: Install dependencies
        run: yarn
      - name: Run tests
        run: yarn run test
      - name: Generate tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      
      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}      
      - name: Build
        run: docker build -t 1066377/rocketseat-ci-api:${{ steps.generate_tag.outputs.sha }} .

      - name: Push image 
        run: docker push 1066377/rocketseat-ci-api:${{ steps.generate_tag.outputs.sha }}